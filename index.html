<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>신장률 계산기 - Workkit</title>
</head>
<body>
  <h1>📈 신장률 계산기</h1>
  <p>작년 수치와 올해 수치를 입력하세요.</p>
  <input id="last" placeholder="작년 수치">  
  <input id="current" placeholder="올해 수치">  
  <button onclick="calc()">계산하기</button>
  <div id="result"></div>

  <script>
    function calc() {
      let last = parseFloat(document.getElementById("last").value);
      let now = parseFloat(document.getElementById("current").value);
      if (!last || !now) {
        document.getElementById("result").innerText = "모두 입력해주세요.";
        return;
      }
      let rate = ((now - last) / last) * 100;
      document.getElementById("result").innerText = "신장률은 " + rate.toFixed(2) + "%입니다.";
    }
  </script>
</body>
</html>
