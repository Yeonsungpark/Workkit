<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>신장률 계산기</title>
</head>
<body>
    <h2>신장률 계산기</h2>
    <p>작년 수치와 올해 수치를 입력하세요.</p>
    <input type="number" id="lastYear" placeholder="작년 수치">
    <input type="number" id="thisYear" placeholder="올해 수치">
    <button onclick="calcGrowth()">계산하기</button>
    <p id="result"></p>

    <script>
        function calcGrowth() {
            const last = parseFloat(document.getElementById("lastYear").value);
            const current = parseFloat(document.getElementById("thisYear").value);
            if (!isNaN(last) && !isNaN(current) && last !== 0) {
                const growth = ((current - last) / last * 100).toFixed(2);
                document.getElementById("result").innerText = `신장률은 ${growth}% 입니다.`;
            } else {
                document.getElementById("result").innerText = "정확한 수치를 입력해주세요.";
            }
        }
    </script>
</body>
</html>
