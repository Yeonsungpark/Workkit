
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대출이자 계산기</title>
  <style>
    body {
      font-family: 'Pretendard', sans-serif;
      background: #f0f4f8;
      padding: 20px;
      margin: 0;
      color: #333;
    }
    .container {
      max-width: 500px;
      margin: auto;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    h2 {
      font-size: 22px;
      text-align: center;
    }
    label {
      font-weight: 600;
      display: block;
      margin-top: 18px;
      font-size: 14px;
    }
    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      margin-top: 25px;
      width: 100%;
      padding: 14px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }
    button:hover {
      background-color: #0056b3;
    }
    .result, .details {
      margin-top: 25px;
      padding: 15px;
      background: #f9fbfe;
      border-radius: 10px;
      font-size: 16px;
      line-height: 1.6;
    }
    .highlight {
      color: #007bff;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🏦 대출이자 계산기</h2>

    <label>💳 대출금액 (원)</label>
    <input type="text" id="loanAmount" placeholder="예: 10,000,000" oninput="formatNumber(this)">

    <label>📆 대출기간 (개월)</label>
    <input type="number" id="loanPeriod" placeholder="예: 24">

    <label>📈 연 이자율 (%)</label>
    <input type="number" step="0.01" id="interestRate" placeholder="예: 3.5">

    <label>🔄 상환방식</label>
    <select id="repaymentType">
      <option value="equal">원리금 균등상환 (매월 원금+이자)</option>
      <option value="interestOnly">만기 일시상환 (이자만 납부)</option>
    </select>

    <button onclick="calculateLoan()">계산하기</button>

    <div class="result" id="resultArea"></div>

    <div class="details">
      <strong>📌 대출상환 방식 안내</strong><br>
      <ul>
        <li><strong>원리금 균등상환:</strong> 매월 원금과 이자를 일정하게 납부하는 방식으로, 매달 상환액은 일정하지만 시간이 갈수록 이자가 줄고 원금 상환 비중이 늘어납니다.</li>
        <li><strong>만기 일시상환:</strong> 매월 이자만 납부하고 만기에 원금을 일시 납부하는 방식으로, 매달 부담이 적지만 만기에 원금을 한 번에 갚아야 합니다.</li>
      </ul>
      <strong>💡 Tip:</strong> 대부분의 직장인은 원리금 균등상환을 선택하여 이자 부담을 낮추는 편입니다.
    </div>
  </div>

  <script>
    function formatNumber(input) {
      input.value = input.value.replace(/[^\d]/g, '').replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    function parseNumber(num) {
      return parseInt(num.replace(/,/g, ''), 10);
    }

    function calculateLoan() {
      const loanAmount = parseNumber(document.getElementById('loanAmount').value);
      const loanPeriod = parseInt(document.getElementById('loanPeriod').value);
      const interestRate = parseFloat(document.getElementById('interestRate').value) / 100;
      const repaymentType = document.getElementById('repaymentType').value;
      const resultArea = document.getElementById('resultArea');

      if (!loanAmount || !loanPeriod || !interestRate) {
        resultArea.innerHTML = '<span style="color:red;">모든 정보를 정확히 입력해주세요.</span>';
        return;
      }

      const monthlyRate = interestRate / 12;
      let monthlyPayment, totalInterest, totalPayment;

      if (repaymentType === 'equal') {
        monthlyPayment = loanAmount * monthlyRate * Math.pow(1 + monthlyRate, loanPeriod) / (Math.pow(1 + monthlyRate, loanPeriod) - 1);
        totalPayment = monthlyPayment * loanPeriod;
        totalInterest = totalPayment - loanAmount;
        resultArea.innerHTML = `
          매월 상환액: <span class="highlight">${Math.round(monthlyPayment).toLocaleString()}원</span><br>
          총 이자액: <span class="highlight">${Math.round(totalInterest).toLocaleString()}원</span><br>
          총 상환금액: <span class="highlight">${Math.round(totalPayment).toLocaleString()}원</span>`;
      } else {
        monthlyPayment = loanAmount * monthlyRate;
        totalInterest = monthlyPayment * loanPeriod;
        totalPayment = loanAmount + totalInterest;
        resultArea.innerHTML = `
          매월 이자액: <span class="highlight">${Math.round(monthlyPayment).toLocaleString()}원</span><br>
          총 이자액: <span class="highlight">${Math.round(totalInterest).toLocaleString()}원</span><br>
          만기 총 상환금액: <span class="highlight">${Math.round(totalPayment).toLocaleString()}원</span>`;
      }
    }
  </script>
</body>
</html>
